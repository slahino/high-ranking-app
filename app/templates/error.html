<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Oups...</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.card {
    background:rgba(255,255,255,0.1);
    padding:50px;
    border-radius:20px;
    backdrop-filter: blur(12px);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    max-width:500px;
    animation: fadeIn .6s ease;
}

h1 {
    font-size:60px;
    margin:0;
}

p {
    margin:20px 0;
    font-size:18px;
    opacity:0.9;
}

.btn {
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:#203a43;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    transition: all .2s ease;
}

.btn:hover {
    background:#e6e6e6;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <h1>Lien Invalide</h1>
    <p>Ce lien est incorrect ou expiré</p>
    <a href="/" class="btn">Retour à l'accueil</a>
</div>

</body>
</html>
