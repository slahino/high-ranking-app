<!DOCTYPE html>
<html>
<head>
    <title>Ouvertures des votes</title>
    <style>
        body {
        height: 100vh;
        font-family: 'Segoe UI', sans-serif;
        background: #141e30;
        margin:0;
        color:white;
        display : flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #countdown {
          font-size: 100px;
          margin-top: 80px;
          color: #cbd5e1;
          width : 60%;
          margin: 0 auto;
          text-align: center;
          
      }
      h1 {
        font-size: 50px;
        margin-bottom: 50px;
        color: #cbd5e1;
        text-align : center;
      }
      .footer {
        margin-top: 30px;
        font-size: 13px;
        color: #94a3b8;
      }
    </style>
</head>
<body>

<h1>Ouverture du vote dans :</h1>

<div id="countdown"></div>
<div class="footer">
        © 2026 Slahino Corp — Accès réservé aux membres du lycée.
      </div>
<script>

let target = {{ target }} * 1000;
let serverTime = {{ server_time }} * 1000;
let startClient = new Date().getTime();

setInterval(function(){

    let nowClient = new Date().getTime();

    let elapsed = nowClient - startClient;

    let nowServer = serverTime + elapsed;

    let distance = target - nowServer;

    if (distance <= 0){
        window.location.href = "/";
        return;
    }

    let days = Math.floor(distance / (1000*60*60*24));
    let hours = Math.floor((distance % (1000*60*60*24)) / (10000*60*60));
    let minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    let seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
       days + "J " + hours + "h " + minutes + "m " + seconds + "s";

},1000);

</script>
