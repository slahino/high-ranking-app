<h1>Ouverture du vote dans :</h1>

<div id="countdown"></div>

<script>

let target = {{ target }} * 1000;
let serverTime = {{ server_time }} * 1000;
let startClient = new Date().getTime();

setInterval(function(){

    let nowClient = new Date().getTime();

    let elapsed = nowClient - startClient;

    let nowServer = serverTime + elapsed;

    let distance = target - nowServer;

    if (distance <= 0){
        window.location.href = "/";
        return;
    }

    let minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    let seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
        minutes + "m " + seconds + "s";

},1000);

</script>
