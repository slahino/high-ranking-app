<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vote Lycée 2025</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
 
<div class="card">

        <h1>Vote pour ton Bélvédère</h1>
        <p>Sélection du meilleur projet 2025-2026</p>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Nom *</label>
            <input type="text" name="nom" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Prénom *</label>
            <input type="text" name="prenom" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Adresse email académique *</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="button-wrapper">
          <button type="submit" class="bouton">Accéder au vote</button>
        </div>
    </form>

    {% if message %}
    <div class="alert alert-{{ category }} mt-4 text-center shadow-sm">
        {{ message }}
    </div>
    {% endif %}

    <div class="footer">
            © 2026 Slahino Corp — Accès réservé aux membres du lycée.
    </div>
</div>
</body>

 <style>

  
      
       body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }


           .card {
            background: rgba(255,255,255,0.05);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #cbd5e1;
            text-align : center;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #cbd5e1;
            text-align : center;
        }

        .form-label {
          color : #cbd5e1;
        }

    .mb-3{
      position: relative;
      margin-bottom: 25px;
}

  .mb-3 {
      width: 100%;
      padding: 6px 6px;
      background: transparent;
      border: none;
      border-bottom: 2px solid #334155;
      color: #e2e8f0;
      font-size: 13px;
      transition: 0.3s ease;
    }

    .button-wrapper {
    display: flex;
    justify-content: center;
}

      .bouton {
            display: inline-block;
            padding: 8px 28px;
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            background: #4ade80;
          
            display : block;
              margin : auto 
            text-align: center;
        }

        .countdown-box {
            color: white;
            text-align: center;
            margin: 20px 0px 20px 0px;
        }

        .countdown-time {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

         .footer {
            margin-top: 15px;
            font-size: 13px;
            color: #94a3b8;
            text-align : center;
        }


/* Overlay sombre */
#popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(6px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    animation: fadeIn 0.4s ease;
}

/* Carte popup */
.popup {
    background: #1e293b;
    padding: 40px;
    border-radius: 16px;
    width: 380px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    transform: scale(0.95);
    animation: popIn 0.3s ease forwards;
}

.popup h2 {
    margin-bottom: 15px;
}

.popup p {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 25px;
}

/* Bouton */
.popup button {
    padding: 12px 25px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #2563eb);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes popIn {
    to { transform: scale(1); }
}

  
      
    </style>

</html>
